    <meta name="twitter:description" content="Request a custom quote from Luxury Shutters & Blinds for high-quality window treatments in Durban. Get personalized solutions for shutters, blinds, and flyscreens.">
    <meta name="twitter:image" content="https://www.luxuryshuttersandblinds.co.za/assets/images/logos/png/Luxury_S&B_logo-06.png">

    <link rel="stylesheet" href="styles/quote-page.css">
    <link rel="stylesheet" href="styles/common-styles.css">


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="preload" as="image" href="assets/images/logos/png/Luxury_S&B_logo-06.png">

    <!-- Structured Data (Schema Markup) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Get a Free Quote - Luxury Shutters & Blinds",
      "description": "Request a personalized quote for custom shutters, blinds, and flyscreens from Luxury Shutters & Blinds in Durban.",
      "url": "https://www.luxuryshuttersandblinds.co.za/quote",
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "https://www.luxuryshuttersandblinds.co.za/quote"
      },
      "publisher": {
        "@type": "Organization",
        "name": "Luxury Shutters & Blinds",
        "logo": {
          "@type": "ImageObject",
          "url": "https://www.luxuryshuttersandblinds.co.za/assets/images/logos/png/Luxury_S&B_logo-06.png"
        }
      }
    }
    </script>

</head>
<body>
    


<div id="header-placeholder"></div>


    <main>
        <section class="section">
            <div class="container">
                <h1 class="section-title">Get a Quote</h1>
                <p class="section-text">Transform Your Space with Elegance</p>
                <form id="quote-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>
                    <div class="form-group">
                        <label for="product">Product</label>
                        <select id="product" name="product" required>
                            <option value="">Select a product</option>
                            <option value="shutters">Shutters</option>
                            <option value="blinds">Blinds</option>
                            <option value="flyscreens">Flyscreens</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="message">Additional Details</label>
                        <textarea id="message" name="message" placeholder="Please provide any additional details or specific requirements"></textarea>
                    </div>
                    <button type="submit">Submit Quote Request</button>
                </form>
            </div>
        </section>
    
        <div id="loadingOverlay" class="loading-overlay">
            <div class="loading-spinner"></div>
            <p>Preparing your quote request...</p>
        </div>

        <section id="map-container" class="section">
            <div class="container">
                <h2 class="section-title">Find Us</h2>
                <p style="text-align: center; font-weight: bold; font-size: 18px; margin-bottom: 20px;">By Appointment Only</p>
                <iframe
                    id="map"
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3457.9791710727686!2d30.95264187489742!3d-29.92250182563116!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1ef7ab9710540c5b%3A0x6788dbe0d559bc85!24%20Carmichael%20Pl%2C%20Woodlands%2C%20Durban%2C%204004!5e0!3m2!1sen!2sza!4v1726777588431!5m2!1sen!2sza"
                    width="600" height="450" style="border:0;"
                    allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
                ></iframe>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="scripts/main.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('quote-form');
            
            const formGroups = document.querySelectorAll('.form-group');
            formGroups.forEach(group => {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                group.appendChild(errorDiv);
            });
        
            form.addEventListener('submit', function(e) {
                e.preventDefault();
        
                document.querySelectorAll('.error-message').forEach(msg => msg.style.display = 'none');
        
                const name = document.getElementById('name').value.trim();
                const email = document.getElementById('email').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const product = document.getElementById('product').value;
                const message = document.getElementById('message').value.trim();
        
                let isValid = true;
                
                if (!name) {
                    showError('name', 'Please enter your name');
                    isValid = false;
                }
        
                if (!email) {
                    showError('email', 'Please enter your email');
                    isValid = false;
                } else if (!isValidEmail(email)) {
                    showError('email', 'Please enter a valid email address');
                    isValid = false;
                }
        
                if (!phone) {
                    showError('phone', 'Please enter your phone number');
                    isValid = false;
                } else if (!isValidPhone(phone)) {
                    showError('phone', 'Please enter a valid phone number');
                    isValid = false;
                }
        
                if (!product) {
                    showError('product', 'Please select a product');
                    isValid = false;
                }
        
                if (isValid) {
                    const loadingOverlay = document.getElementById('loadingOverlay');
                    loadingOverlay.style.display = 'flex';
        
                    const whatsappMessage = `Hello, I'm ${name}. I would like a quote for ${product}. Here are my details:\n\nEmail: ${email}\nPhone: ${phone}\n\nAdditional Details: ${message}`;
                    const encodedMessage = encodeURIComponent(whatsappMessage);
                    const whatsappLink = `https://wa.me/27732899370?text=${encodedMessage}`;
        
                    setTimeout(() => {
                        loadingOverlay.style.display = 'none';
                        window.open(whatsappLink, '_blank');
                        form.reset();
                    }, 1500);
                }
            });
        
            function showError(fieldId, message) {
                const field = document.getElementById(fieldId);
                const errorDiv = field.parentElement.querySelector('.error-message');
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            }
        
            function isValidEmail(email) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            }
        
            function isValidPhone(phone) {
                return /^[\d\s+()-]{10,}$/.test(phone);
            }
        });
    </script>

    
</body>
</html>
